name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  engine-tests-msrv:
    name: Engine Tests (Rust 1.88.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Test engine crates
        run: cargo test -p smolpc-engine-core -p smolpc-engine-client -p smolpc-engine-host

  engine-tests-stable:
    name: Engine Tests (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test engine crates
        run: cargo test -p smolpc-engine-core -p smolpc-engine-client -p smolpc-engine-host

  tauri-build-check:
    name: Tauri Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Check Tauri crate builds
        run: cargo check -p smolpc-code-helper

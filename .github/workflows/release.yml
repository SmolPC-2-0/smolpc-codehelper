name: 'publish'

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
          # Uncomment for Intel builds
          #   - platform: 'macos-latest' # for Intel based macs.
          #     args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-24.04'
            target: 'x86_64-unknown-linux-gnu'
            args: '--target x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: '--target x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23'
      - name: Install frontend dependencies
        run: npm ci

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build shared engine host sidecar
        run: cargo build --release -p smolpc-engine-host ${{ matrix.args }}

      - name: Stage sidecar binary (unix)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p apps/codehelper/src-tauri/binaries
          SIDE_BIN="target/${{ matrix.target }}/release/smolpc-engine-host"
          if [ ! -f "$SIDE_BIN" ]; then
            echo "Expected sidecar binary missing: $SIDE_BIN"
            echo "Build output did not contain target-specific sidecar artifact."
            exit 1
          fi
          cp "$SIDE_BIN" "apps/codehelper/src-tauri/binaries/smolpc-engine-host-${{ matrix.target }}"
          chmod +x "apps/codehelper/src-tauri/binaries/smolpc-engine-host-${{ matrix.target }}"

      - name: Stage sidecar binary (windows)
        if: matrix.platform == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Path apps/codehelper/src-tauri/binaries -Force | Out-Null
          $sideBin = "target/${{ matrix.target }}/release/smolpc-engine-host.exe"
          if (!(Test-Path $sideBin)) {
            Write-Error "Expected sidecar binary missing: $sideBin"
            throw "Build output did not contain target-specific sidecar artifact."
          }
          Copy-Item $sideBin "apps/codehelper/src-tauri/binaries/smolpc-engine-host-${{ matrix.target }}.exe" -Force

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/codehelper
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'See [CHANGES.md](https://github.com/alysonhower/tauri2-svelte5-shadcn/blob/main/CHANGES.md) for a complete list of changes.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
